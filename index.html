				var getRandomGradientBlob = async () => {
  var t = document.createElement("canvas"),
    e = t.getContext("2d");
  e.rect(0, 0, t.width, t.height);
  var a = e.createLinearGradient(0, 0, t.width, t.height);
  return a.addColorStop(0, `#${(16777215*Math.random()<<0).toString(16).padStart(6,"0")}`), a.addColorStop(1, `#${(16777215*Math.random()<<0).toString(16).padStart(6,"0")}`), e.fillStyle = a, e.fill(), URL.createObjectURL(await new Promise(e => t.toBlob(t => e(t))))
};
window.onload = (async () => {
  var t, e = await fetch("https://api.github.com/users/nifanfa/repos", {
    mode: "cors",
    headers: {
      Authorization: btoa("dG9rZW4gZ2hwXzg3TFFXMXBCTlV4WHBwWHY4bHlIMW42aFdySVdYbTBkMExjUA==")
    }
  }).then(t => t.json());
  for (const n of e) {
    var a = [],
      o = await fetch("https://api.github.com/repos/" + n.full_name + "/contents", {
        mode: "cors",
        headers: {
          Authorization: btoa("dG9rZW4gZ2hwXzg3TFFXMXBCTlV4WHBwWHY4bHlIMW42aFdySVdYbTBkMExjUA==")
        }
      }).then(t => t.json());
    for (const t of o) "file" == t.type && t.name.endsWith(".png") && a.push(t.download_url);
    $("#under").after(`<section class="spotlight style1 orient-${t?"left":"right"} content-align-${t?"left":"right"} image-position-center onscroll-image-fade-in" id="projects"><div class="content"><h2>${n.name}</h2><p>${n.description||""}</p><ul class="actions stacked"><li><a href="${n.html_url}" class="button">Learn More</a></li></ul></div><div class="image"><img src="${a[0]||await getRandomGradientBlob()}" alt="" /></div></section>`), t = !t
  }
});
