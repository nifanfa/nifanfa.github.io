		<title>Story by HTML5 UP</title>

		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper" class="divided">

				<!-- One -->
					<section class="banner style1 orient-left content-align-left image-position-right fullscreen onload-image-fade-in onload-content-fade-right">
						<div class="content">
							<h1>NIFANFA</h1>
							<p class="major">Hello! a OS dever from China. follow me on <a href="https://github.com/nifanfa">Github</a>! Also my <a href="https://www.youtube.com/channel/UCRc7JKU7JzMJUPiRMK84XhQ">Youtube</a>.</p>
							<ul class="actions stacked">
								<li><a href="#0" class="button big wide smooth-scroll-middle">Take a loot of my Projects</a></li>
							</ul>
						</div>
						<div class="image">
							<img src="https://github.com/nifanfa.png" alt="" />
						</div>
					</section>
					<span id="under" class=""></span>

				<!-- Footer -->
					<footer class="wrapper style1 align-center">
						<div class="inner">
							<ul class="icons">
								<li><a href="mailto:nifanfa@foxmail.com" class="icon style2 fa-envelope"><span class="label">Email</span></a></li>
							</ul>
							<p>&copy; 2022 Nifanfa and Elijah629. Design: <a href="https://html5up.net">HTML5 UP</p>
						</div>
					</footer>

			</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.scrollex.min.js"></script>
			<script src="assets/js/jquery.scrolly.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script>
				var getRandomGradientBlob=async()=>
				{
					var t=document.createElement("canvas"),a=t.getContext("2d");
					t.height*=4;
					t.width*=4;
					a.rect(0,0,t.width,t.height);
					var e=a.createLinearGradient(0,0,t.width,t.height);
					return e.addColorStop(0,`#${(16777215*Math.random()<<0).toString(16).padStart(6,"0")}`),e.addColorStop(1,`#${(16777215*Math.random()<<0).toString(16).padStart(6,"0")}`),a.fillStyle=e,a.fill(),URL.createObjectURL(await new Promise(a=>t.toBlob(t=>a(t))))
				};
				window.onload=(async()=>
				{
					var counter;
					var a=await fetch("https://api.github.com/users/nifanfa/repos",{mode:"cors",headers:{Authorization:atob("dG9rZW4gZ2hwXzg3TFFXMXBCTlV4WHBwWHY4bHlIMW42aFdySVdYbTBkMExjUA==")}}).then(t=>t.json());
					counter =0;
					for(var e = a.length-1;e>=0;e--)
					{
						var t = null;
						var o=null;
						var i=await fetch("https://api.github.com/repos/"+a[e].full_name+"/contents",{mode:"cors",headers:{Authorization:atob("dG9rZW4gZ2hwXzg3TFFXMXBCTlV4WHBwWHY4bHlIMW42aFdySVdYbTBkMExjUA==")}}).then(t=>t.json());
						for(const t of i)
						{
							if(!t.name.endsWith(".png"))continue;
							(o=t.download_url);a[e].image=o
						}
						
						if(a[e].image!=null)
						{
							$("#under").after
							(`
							<section class="spotlight style1 ${(counter % 2)==0?"orient-left":"orient-right"} content-align-left image-position-center onscroll-image-fade-in" id="${counter}">
								<div class="content">
									<h2 style="background: url(${await getRandomGradientBlob()}) no-repeat;-webkit-background-clip: text;-webkit-text-fill-color: transparent;">${a[e].name}</h2>
									<p>${a[e].description||""}</p>
									<ul class="actions stacked">
										<li><a href="${a[e].html_url}" class="button">Learn More</a></li>
									</ul>
								</div>
								<div class="image">
								<img style="object-fit: scale-down;background-color: white;" src="${a[e].image}" alt="" />
								</div>
							</section>
							`);
							counter++;
						}
					}
				});
			</script>

	</body>
</html>
